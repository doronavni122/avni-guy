name: Article remediation batch

on:
  schedule:
    # Every 12 hours UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: Override batch size (default from remediation-program.json)
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  pass1-scaffold-batch:
    runs-on: ubuntu-latest
    env:
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard remediation program cap
        id: program
        env:
          REMEDIATION_BATCH_OVERRIDE: ${{ github.event.inputs.batch_size }}
        run: node scripts/emit-remediation-program-gha.mjs

      - name: Skip when program inactive or cap reached
        if: steps.program.outputs.active != 'true' || steps.program.outputs.batch_size == '0'
        run: |
          echo "Remediation program complete or paused; skipping scaffold PR."
          echo "Completed: ${{ steps.program.outputs.completed }}/${{ steps.program.outputs.max }}"

      - name: Verify EXA_API_KEY secret
        if: steps.program.outputs.active == 'true' && steps.program.outputs.batch_size != '0'
        run: node scripts/check-exa-api-key.mjs

      - name: Pick failing slugs and scaffold research
        if: steps.program.outputs.active == 'true' && steps.program.outputs.batch_size != '0'
        env:
          REMEDIATION_BATCH_SIZE: ${{ steps.program.outputs.batch_size }}
        run: |
          node scripts/run-article-remediation.mjs --pick-failures="${REMEDIATION_BATCH_SIZE}" --scaffold --emit-queue --print-steps

      - name: List pending count
        if: steps.program.outputs.active == 'true' && steps.program.outputs.batch_size != '0'
        run: node scripts/run-article-remediation.mjs --list-pending | tail -1

      - name: Create remediation PR branch
        id: branch
        if: steps.program.outputs.active == 'true' && steps.program.outputs.batch_size != '0'
        run: |
          BRANCH="auto/remediation-$(date -u +%Y%m%d-%H%M)"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content-research/ config/remediation-batch.json
          if git diff --staged --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No scaffolds to commit (batch may be complete)."
          else
            git commit -m "auto-scaffold-remediation-batch"
            git push -u origin "$BRANCH"
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.branch.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PIPELINE_SLUGS: ''
        run: |
          SLUGS=$(node --input-type=module -e "import fs from 'node:fs'; const q=JSON.parse(fs.readFileSync('config/remediation-batch.json','utf8')); console.log(q.pipelineSlugs||'');")
          COMPLETED="${{ steps.program.outputs.completed }}"
          MAX="${{ steps.program.outputs.max }}"
          BODY="$(cat <<EOF
## Automated Pass 1 batch (scaffold)

Research scaffolds under \`content-research/\`. Program progress: **${COMPLETED}/${MAX}** completed.

\`PIPELINE_SLUGS=${SLUGS}\`

\`config/remediation-batch.json\` lists batch slugs. Cursor Automation should run Pass 1 and merge when audits pass.

### Pass 1 (Cursor Automation / agent)
Requires \`EXA_API_KEY\` in **Cursor Automation environment** (same value as GitHub secret \`EXA_API_KEY\` / Vercel; not synced automatically).

Per slug:
1. \`pnpm run article:pipeline -- <slug> --force-research\`
2. \`CONTENT_AUDIT_SLUGS=<slug> CONTENT_STRICT=1 PIPELINE_CONTRACT=1 pnpm run content:audit\`
3. \`LINKS_AUDIT_SLUGS=<slug> LINKS_AUDIT_ENFORCE=1 PIPELINE_CONTRACT=1 pnpm run links:audit\`
4. \`pnpm run research:audit -- <slug>\`

After batch: \`node scripts/run-article-remediation.mjs --verify\` with \`PIPELINE_SLUGS\` set; update \`config/remediation-program.json\` \`completedSlugs\`; merge when all pass.

Studies stay in \`content-research/\`; do not delete unless \`RESEARCH_ALLOW_DELETE=1\`.
EOF
)"
          gh pr create --base main --head "${{ steps.branch.outputs.name }}" \
            --title "auto: remediation batch (${COMPLETED}/${MAX})" \
            --body "$BODY"
          PR_URL=$(gh pr view --head "${{ steps.branch.outputs.name }}" --json url -q .url)
          gh pr edit "$PR_URL" --add-label "remediation-batch" 2>/dev/null || true
