name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: '1'
      CONTENT_AUDIT_ENFORCE: '1'
      CONTENT_LINKS_STRICT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify content
        run: pnpm run verify:content

      - name: Research audit (scoped)
        if: env.RESEARCH_AUDIT_SLUGS != ''
        run: pnpm run research:audit
        env:
          RESEARCH_AUDIT_SLUGS: ${{ env.RESEARCH_AUDIT_SLUGS }}

      - name: SEO guardrails
        run: pnpm run seo:guardrails

      - name: Build and smoke tests
        run: pnpm run build:ci
