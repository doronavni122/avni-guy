name: Internal Links Quarterly Audit

on:
  schedule:
    # Every 90 days (~quarterly): 1st of Jan, Apr, Jul, Oct at 06:00 UTC
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  links-quarterly:
    runs-on: ubuntu-latest
    env:
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full internal links audit (61 rules, report-only)
        run: pnpm run links:audit:full 2>&1 | tee internal-links-full-report.txt
        continue-on-error: true

      - name: Graph links audit (supplement)
        run: pnpm run links:audit 2>&1 | tee internal-links-graph-report.txt
        continue-on-error: true

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: internal-links-quarterly-${{ github.run_id }}
          path: |
            internal-links-full-report.txt
            internal-links-graph-report.txt
          retention-days: 90

      - name: Summary
        run: |
          echo "## Internal Links Quarterly Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Report-only (no enforce). Artifacts retained 90 days." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -n 30 internal-links-full-report.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
